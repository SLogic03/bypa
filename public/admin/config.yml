backend:
  name: github
  repo: phillow7474/pageByronAltamirano
  branch: master

local_backend: true

media_folder: "public/assets/img"
public_folder: "/assets/img"

collections:
  - name: "settings"
    label: "Configuración del Sitio"
    files:
      - name: "site-data"
        label: "Contenido del Sitio"
        file: "src/data/site-data.json"
        format: "json"
        fields:
          - label: "Hero (Portada)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Apellido", name: "apellido", widget: "string" }
              - { label: "Subtítulo Superior", name: "taglineTop", widget: "string" }
              - { label: "Subtítulo Inferior", name: "taglineBottom", widget: "string" }
              - { label: "Imagen de Fondo", name: "heroImage", widget: "string" }

          - label: "Cita Principal"
            name: "cita"
            widget: "object"
            fields:
              - { label: "Texto de la Cita", name: "texto", widget: "text" }
              - { label: "Autor", name: "autor", widget: "string" }
              - { label: "Rol del Autor", name: "rol", widget: "string" }

          - label: "Estadísticas"
            name: "stats"
            widget: "object"
            fields:
              - { label: "Etiqueta", name: "sectionTag", widget: "string" }
              - { label: "Título", name: "sectionTitle", widget: "string" }
              - { label: "Descripción", name: "sectionDesc", widget: "string" }
              - label: "Lista de Stats"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Ícono", name: "icon", widget: "string" }
                  - { label: "Número", name: "count", widget: "number", value_type: "int" }
                  - { label: "Unidad", name: "unit", widget: "string" }
                  - { label: "Descripción", name: "label", widget: "string" }

          - label: "Servicios"
            name: "servicios"
            widget: "object"
            fields:
              - { label: "Etiqueta", name: "sectionTag", widget: "string" }
              - { label: "Título", name: "sectionTitle", widget: "string" }
              - { label: "Título Resaltado", name: "sectionTitleHighlight", widget: "string" }
              - label: "Lista de Servicios"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Ícono", name: "icon", widget: "string" }
                  - { label: "Nombre", name: "nombre", widget: "string" }
                  - label: "Características"
                    name: "features"
                    widget: "list"
                    fields:
                      - { label: "Título", name: "titulo", widget: "string" }
                      - { label: "Descripción", name: "texto", widget: "text" }
                  - { label: "Nota", name: "nota", widget: "string", required: false }
                  - { label: "Texto Botón", name: "ctaTexto", widget: "string" }
                  - { label: "Link Botón", name: "ctaLink", widget: "string" }

          - label: "Pilares"
            name: "pilares"
            widget: "object"
            fields:
              - { label: "Etiqueta", name: "sectionTag", widget: "string" }
              - { label: "Título", name: "sectionTitle", widget: "string" }
              - { label: "Título Resaltado", name: "sectionTitleHighlight", widget: "string" }
              - { label: "Descripción", name: "sectionDesc", widget: "string" }
              - label: "Lista de Pilares"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Ícono", name: "icon", widget: "string" }
                  - { label: "Título", name: "titulo", widget: "string" }
                  - { label: "Descripción", name: "texto", widget: "text" }

          - label: "Sobre Mí"
            name: "about"
            widget: "object"
            fields:
              - { label: "Etiqueta", name: "sectionTag", widget: "string" }
              - { label: "Título", name: "sectionTitle", widget: "string" }
              - { label: "Foto", name: "aboutImage", widget: "string" }
              - label: "Párrafos"
                name: "parrafos"
                widget: "list"
                field: { label: "Párrafo", name: "parrafo", widget: "text" }
              - { label: "Frase Destacada", name: "destacado", widget: "string" }

          - label: "Banner CTA"
            name: "ctaBanner"
            widget: "object"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto", name: "texto", widget: "string" }

          - label: "Contacto"
            name: "contacto"
            widget: "object"
            fields:
              - { label: "Etiqueta", name: "sectionTag", widget: "string" }
              - { label: "Título", name: "sectionTitle", widget: "string" }
              - label: "WhatsApp"
                name: "whatsapp"
                widget: "object"
                fields:
                  - { label: "Número", name: "numero", widget: "string" }
                  - { label: "Mensaje (URL encoded)", name: "mensaje", widget: "text" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Link Instagram", name: "instagram", widget: "string" }
              - { label: "Usuario Instagram", name: "instagramUser", widget: "string" }
              - { label: "Link TikTok", name: "tiktok", widget: "string" }
              - { label: "Usuario TikTok", name: "tiktokUser", widget: "string" }

          - label: "Pie de Página"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Texto de Marca", name: "brandText", widget: "text" }
              - { label: "Copyright", name: "copyright", widget: "string" }

          - label: "Widget WhatsApp"
            name: "whatsappWidget"
            widget: "object"
            fields:
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Rol", name: "rol", widget: "string" }
              - { label: "Mensaje Bienvenida", name: "mensajeBienvenida", widget: "string" }
              - label: "Opciones Rápidas"
                name: "opciones"
                widget: "list"
                fields:
                  - { label: "Ícono", name: "icon", widget: "string" }
                  - { label: "Texto", name: "texto", widget: "string" }
                  - { label: "Mensaje", name: "msg", widget: "string" }
